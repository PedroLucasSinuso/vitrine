services:
  vitrine:
    build:
      context: .
      dockerfile: vitrine_backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./vitrine_backend/data:/app/data
      - ./vitrine_backend/logs:/app/logs
      - ./vitrine_backend/app/static:/app/app/static
    env_file:
      - ./vitrine_backend/.env
    restart: unless-stopped
